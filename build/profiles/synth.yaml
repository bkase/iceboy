profile: synth
description: Default hardware-oriented build with no semantic or debug fanout on the PPU surface.
simulation_tops:
  - board::icebreaker_top::icebreaker_top
output_ports: []
instrumentation:
  semantic_commit: false
  debug_trace: false
  activity_counters: false
verification:
  script: tools/verify_hw_build.sh
  forbids_debug_symbols:
    - CommitTrace
    - DebugTrace
    - PpuDebugTrace
    - SimStimulus
    - BusObs
    - SocLockstepTopOut
  baseline:
    script: tools/run_hardware_baseline.sh
    report: docs/hardware/icebreaker_up5k_baseline.json
resource_budget:
  audience: hardware
  expected_overhead: none
  notes:
    - Keep synthesis outputs free of PPU semantic/debug buses.
    - Prefer the existing src/board top path for hardware builds.
    - Record constrained synth and nextpnr results in the checked-in hardware baseline JSON.
