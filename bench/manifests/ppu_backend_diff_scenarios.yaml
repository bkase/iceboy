schema_version: 1
description: Nightly PPU backend-differential capture comparisons.
scenarios:
  - name: warmup_blank_smoke
    description: >
      Compare a minimal early-frame semantic capture across the trivial sim-array
      backend and the inferred-RAM backend. This is the first backend-diff lane;
      live memory-traffic activation remains a follow-up once step_dot emits
      non-idle mem_reqs.
    sim_array_capture: ../../test/ppu/backend_diff/fixtures/warmup_blank_sim_array.json
    inferred_ram_capture: ../../test/ppu/backend_diff/fixtures/warmup_blank_inferred_ram.json
    scopes:
      - dot_commit
      - scanline_summary
      - frame_hash
