schema_version: 1
description: Nightly PPU backend-differential capture comparisons.
scenarios:
  - name: warmup_blank_smoke
    description: >
      Compare deterministic live OAM-scan captures generated from the direct
      ppu_test_top and trace_observe_top surfaces once step_dot emits non-idle
      memory requests. This activates the nightly lane with real live traffic
      instead of checked-in placeholder fixtures.
    sim_array_generator:
      runner: swim
      target: test/ppu/backend_diff/test_backend_diff_capture_ppu_test_top.py
      dots: 520
    inferred_ram_generator:
      runner: swim
      target: test/ppu/backend_diff/test_backend_diff_capture_trace_top.py
      dots: 520
    scopes:
      - dot_commit
