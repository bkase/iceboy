schema_version: 1
abi_contract:
  sym_file_required: true
  executable_labels:
    required:
      - __pass
      - __fail
    optional_prefixes:
      - __checkpoint_
      - __commit_
      - __inject_begin_
      - __inject_end_
  wram_signature_block:
    id: wram.v1
    versioned: true

roms:
