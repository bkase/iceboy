  - id: LOADS_BASIC
    path: bench/roms/out/LOADS_BASIC.gb
    requires: [cpu]
    oracle_mode: checkpoint
    memory_behavior_profile: DmgConservative
    timeout_commits: 250000
    checkpoint_symbols: []
    pass_condition:
      kind: label_or_wram_signature
      pass_label: __pass
      fail_label: __fail
      signature_block: wram.v1
    compare_scope:
      domains: [cpu_core, wram_signature]
    action_script: null
    action_gen: null

