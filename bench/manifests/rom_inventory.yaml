schema_version: 1
abi_contract:
  sym_file_required: true
  executable_labels:
    required:
      - __pass
      - __fail
    optional_prefixes:
      - __checkpoint_
      - __commit_
      - __inject_begin_
      - __inject_end_
  wram_signature_block:
    id: wram.v1
    versioned: true

roms:
  # Wave A: pure CPU core bring-up
  - id: LOADS_BASIC
    path: bench/roms/out/loads_basic.gb
    model_profile: DMG
    reset_profile: SkipBoot
    requires: [cpu]
    oracle_mode: checkpoint
    memory_behavior_profile: DmgConservative
    timeout_commits: 250000
    checkpoint_symbols: [__checkpoint_ld_r_r, __checkpoint_ld_r_n8, __checkpoint_ld_mem, __checkpoint_ld_r16]
    pass_condition:
      kind: label_or_wram_signature
      pass_label: __pass
      fail_label: __fail
      signature_block: wram.v1
    compare_scope:
      domains: [cpu_core, wram_signature]
    action_script: null
    action_gen: null

