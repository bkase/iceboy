    oracle_mode: checkpoint
    raster_event_coord_space: symbolic
    timeout_commits: 250000
    checkpoint_symbols: [__checkpoint_ld_r_r, __checkpoint_ld_r_n8, __checkpoint_ld_mem, __checkpoint_ld_r16]
    compare_scope:
