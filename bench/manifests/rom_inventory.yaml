schema_version: 2
abi_contract:
  sym_file_required: true
  executable_labels:
    required:
      - __pass
      - __fail
    optional_prefixes:
      - __checkpoint_
      - __commit_
      - __inject_begin_
      - __inject_end_
  wram_signature_block:
    id: wram.v1
    versioned: true

artifact_schemas:
  replay_capsule: bench/schemas/replay_capsule.schema.json
  oracle_capture: bench/schemas/oracle_capture.schema.json
  line_summary: bench/schemas/line_summary.schema.json

defaults:
  dmg_behavior_config: &dmg_behavior_config
    model: DMG
    soc_revision: null
    features: []
  dmg_entry: &dmg_entry
    model_profile: DMG
    reset_profile: SkipBoot
    memory_behavior_profile: DmgConservative
    build_flavor: sim_semantic
    memory_backend: sim_array
    behavior_config: *dmg_behavior_config
    rule_confidence: Exact
    allowed_uncertainty: []
    expected_soc_revisions: []
    required_behavior_features: []
    forbidden_behavior_features: []
    pass_condition: &default_pass_condition
      kind: label_or_wram_signature
      pass_label: __pass
      fail_label: __fail
      signature_block: wram.v1
    action_script: null
    action_gen: null

